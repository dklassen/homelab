apiVersion: v1
kind: Service
metadata:
  name: {{ include "clickhouse-keeper.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickhouse-keeper.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "clickhouse-keeper.selectorLabels" . | nindent 4 }}
  ports:
    - name: client
      port: {{ .Values.service.clientPort }}
      targetPort: client
      protocol: TCP
