apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clickhouse-keeper.dnsName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickhouse-keeper.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "clickhouse-keeper.dnsName" . }}-headless
  podManagementPolicy: Parallel
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "clickhouse-keeper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clickhouse-keeper.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: clickhouse-keeper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              ORDINAL="${HOSTNAME##*-}"
              export KEEPER_SERVER_ID="$((ORDINAL + 1))"
              exec clickhouse-keeper --config-file=/etc/clickhouse-keeper/keeper_config.xml
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: client
              containerPort: {{ .Values.service.clientPort }}
              protocol: TCP
            - name: raft
              containerPort: {{ .Values.service.raftPort }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/clickhouse-keeper
            - name: data
              mountPath: /var/lib/clickhouse
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "clickhouse-keeper.fullname" . }}-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "clickhouse-keeper.selectorLabels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
