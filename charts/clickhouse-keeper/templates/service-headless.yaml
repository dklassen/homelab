apiVersion: v1
kind: Service
metadata:
  name: {{ include "clickhouse-keeper.dnsName" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickhouse-keeper.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true  # needed so Raft peers resolve before quorum forms
  selector:
    {{- include "clickhouse-keeper.selectorLabels" . | nindent 4 }}
  ports:
    - name: client
      port: {{ .Values.service.clientPort }}
      targetPort: client
      protocol: TCP
    - name: raft
      port: {{ .Values.service.raftPort }}
      targetPort: raft
      protocol: TCP
